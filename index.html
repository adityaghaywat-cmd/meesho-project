<!DOCTYPE html>
<html>
<head>
    <title>Boys Fashion Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        header {
            background: purple;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 0 5px gray;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        button {
            background: purple;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>Boys Fashion Store</h1>
</header>

<div class="products" id="products"></div>

<script>
const products = [];

for(let i=1; i<=50; i++){
    products.push({
        name: "Boys T-Shirt " + i,
        price: "₹" + (299 + i*10),
        image: "https://via.placeholder.com/200"
    });
}

let html = "";

products.forEach(product => {
    html += `
    <div class="card">
        <img src="${product.image}">
        <h3>${product.name}</h3>
        <p>${product.price}</p>
        <button>Buy Now</button>
    </div>`;
});

document.getElementById("products").innerHTML = html;
</script>

</body>
</html>
